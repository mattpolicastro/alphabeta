<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pyodide / gbstats Compatibility Test</title>
  <style>
    body { font-family: system-ui, monospace; padding: 2rem; max-width: 900px; margin: 0 auto; background: #fafafa; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #666; margin-bottom: 2rem; }
    .pass { color: #16a34a; font-weight: bold; }
    .fail { color: #dc2626; font-weight: bold; }
    .info { color: #2563eb; }
    .warn { color: #d97706; }
    #log { white-space: pre-wrap; background: #fff; padding: 1rem; border: 1px solid #e5e7eb; border-radius: 6px; font-family: monospace; font-size: 13px; line-height: 1.6; max-height: 80vh; overflow-y: auto; }
    button { padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer; border: 1px solid #d1d5db; border-radius: 4px; background: #fff; }
    button:hover { background: #f3f4f6; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .summary { margin-top: 1rem; padding: 1rem; border-radius: 6px; font-weight: bold; font-size: 1.1rem; }
    .summary.pass-bg { background: #dcfce7; border: 1px solid #16a34a; color: #16a34a; }
    .summary.fail-bg { background: #fee2e2; border: 1px solid #dc2626; color: #dc2626; }
  </style>
</head>
<body>
  <h1>Pyodide / gbstats Compatibility Spike</h1>
  <p class="subtitle">
    Validates that gbstats produces identical results under Pyodide WASM vs CPython.
    <br>See requirements.md Section 13.1. Reference values from <code>scripts/pyodide-reference.py</code>.
  </p>
  <button id="run" onclick="runTests()">Run Tests</button>
  <div id="summary"></div>
  <div id="log">Click "Run Tests" to start…</div>

  <script>
    // CPython reference values — generated by scripts/pyodide-reference.py
    const EXPECTED = {
      fixture: { n_ctrl: 5000, cv_ctrl: 480, n_trt: 5100, cv_trt: 551 },
      bayesian: {
        chance_to_win: 0.9701497839107466,
        expected: 0.12540849673202606,
        ci: [-0.005125862697069161, 0.2559428561611212],
        risk: [0.1261778731214695, 0.0007693763894434433],
        uplift_mean: 0.12540849673202606,
        uplift_stddev: 0.06660038677176396,
      },
      frequentist: {
        expected: 0.12540849673202606,
        ci: [-0.005141527199293561, 0.2559585206633457],
        p_value: 0.059729181511460894,
        uplift_mean: 0.12540849673202606,
        uplift_stddev: 0.06660038677176396,
      },
      srm: {
        balanced_p: 0.3197181768128675,
        imbalanced_p: 9.505397766554137e-111,
      },
    };

    const TOLERANCE = 1e-6; // relaxed from 1e-9 for WASM floating-point differences

    let totalAssertions = 0;
    let passedAssertions = 0;
    let failedAssertions = 0;

    function log(msg, cls) {
      const el = document.getElementById('log');
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = msg;
      el.appendChild(line);
      console.log(msg);
    }

    function assertClose(label, actual, expected, tol) {
      tol = tol ?? TOLERANCE;
      totalAssertions++;
      const diff = Math.abs(actual - expected);
      // For very small expected values, use absolute tolerance
      // For larger values, use relative tolerance
      const threshold = Math.abs(expected) > 1e-20
        ? tol * Math.max(1, Math.abs(expected))
        : tol;
      if (diff <= threshold) {
        passedAssertions++;
        log(`  ✓ ${label}: ${actual} (diff=${diff.toExponential(3)})`, 'pass');
      } else {
        failedAssertions++;
        log(`  ✗ ${label}: got ${actual}, expected ${expected} (diff=${diff.toExponential(3)}, threshold=${threshold.toExponential(3)})`, 'fail');
      }
    }

    function assertCloseArray(label, actual, expected, tol) {
      if (actual.length !== expected.length) {
        totalAssertions++;
        failedAssertions++;
        log(`  ✗ ${label}: length mismatch (got ${actual.length}, expected ${expected.length})`, 'fail');
        return;
      }
      for (let i = 0; i < expected.length; i++) {
        assertClose(`${label}[${i}]`, actual[i], expected[i], tol);
      }
    }

    async function runTests() {
      const logEl = document.getElementById('log');
      logEl.innerHTML = '';
      document.getElementById('summary').innerHTML = '';
      document.getElementById('run').disabled = true;
      totalAssertions = 0;
      passedAssertions = 0;
      failedAssertions = 0;

      const t0 = performance.now();

      try {
        // --- Load Pyodide ---
        log('Loading Pyodide…', 'info');
        const pyodide = await loadPyodide({
          indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.26.2/full/',
        });
        log(`Pyodide loaded in ${((performance.now() - t0) / 1000).toFixed(1)}s`, 'info');

        // --- Load numpy + scipy ---
        const t1 = performance.now();
        log('Loading numpy + scipy (this may take a minute on first run)…', 'info');
        await pyodide.loadPackage(['numpy', 'scipy', 'pandas']);
        log(`numpy + scipy + pandas loaded in ${((performance.now() - t1) / 1000).toFixed(1)}s`, 'info');

        // --- Install gbstats via micropip ---
        const t2 = performance.now();
        log('Installing gbstats via micropip…', 'info');
        await pyodide.loadPackage('micropip');
        await pyodide.runPythonAsync(`
import micropip

# gbstats 0.8.0 has overly-conservative upper-bound pins:
#   numpy<2.0.0, pandas<2.0.0, scipy<2.0.0
# Pyodide 0.26.2 ships numpy 1.26.4, scipy 1.12.0, pandas 2.2.0
# pandas 2.2.0 breaks the pin but gbstats doesn't use pandas 2.x-incompatible APIs.
#
# Strategy: pre-load C-extension deps via loadPackage (already done above),
# install remaining pure-Python deps individually, then install gbstats
# with deps=False to skip the resolver entirely.
await micropip.install(['pydantic', 'packaging', 'nbformat'])
await micropip.install('gbstats', deps=False)
        `);
        log(`gbstats installed in ${((performance.now() - t2) / 1000).toFixed(1)}s`, 'info');

        // --- Verify imports ---
        log('\nVerifying imports…', 'info');
        await pyodide.runPythonAsync(`
from gbstats.bayesian.tests import EffectBayesianABTest, EffectBayesianConfig
from gbstats.frequentist.tests import TwoSidedTTest, FrequentistConfig
from gbstats.models.statistics import ProportionStatistic
from gbstats.utils import check_srm
import json
        `);
        log('All imports successful.', 'pass');

        // ============================================================
        // Test 1: Bayesian (EffectBayesianABTest with ProportionStatistic)
        // ============================================================
        log('\n═══ Test 1: Bayesian EffectBayesianABTest ═══', 'info');
        const bayesianJson = await pyodide.runPythonAsync(`
stat_a = ProportionStatistic(n=${EXPECTED.fixture.n_ctrl}, sum=${EXPECTED.fixture.cv_ctrl})
stat_b = ProportionStatistic(n=${EXPECTED.fixture.n_trt}, sum=${EXPECTED.fixture.cv_trt})
config = EffectBayesianConfig(difference_type="relative", alpha=0.05)
test = EffectBayesianABTest(stat_a=stat_a, stat_b=stat_b, config=config)
result = test.compute_result()

json.dumps({
    "chance_to_win": result.chance_to_win,
    "expected": result.expected,
    "ci": result.ci,
    "risk": result.risk,
    "uplift_mean": result.uplift.mean,
    "uplift_stddev": result.uplift.stddev,
    "error_message": result.error_message,
})
        `);
        const bayesian = JSON.parse(bayesianJson);

        assertClose('chance_to_win', bayesian.chance_to_win, EXPECTED.bayesian.chance_to_win);
        assertClose('expected', bayesian.expected, EXPECTED.bayesian.expected);
        assertCloseArray('ci', bayesian.ci, EXPECTED.bayesian.ci);
        assertCloseArray('risk', bayesian.risk, EXPECTED.bayesian.risk);
        assertClose('uplift_mean', bayesian.uplift_mean, EXPECTED.bayesian.uplift_mean);
        assertClose('uplift_stddev', bayesian.uplift_stddev, EXPECTED.bayesian.uplift_stddev);

        // ============================================================
        // Test 2: Frequentist (TwoSidedTTest with ProportionStatistic)
        // ============================================================
        log('\n═══ Test 2: Frequentist TwoSidedTTest ═══', 'info');
        const freqJson = await pyodide.runPythonAsync(`
stat_a = ProportionStatistic(n=${EXPECTED.fixture.n_ctrl}, sum=${EXPECTED.fixture.cv_ctrl})
stat_b = ProportionStatistic(n=${EXPECTED.fixture.n_trt}, sum=${EXPECTED.fixture.cv_trt})
config = FrequentistConfig(difference_type="relative", alpha=0.05)
test = TwoSidedTTest(stat_a=stat_a, stat_b=stat_b, config=config)
result = test.compute_result()

json.dumps({
    "expected": result.expected,
    "ci": result.ci,
    "p_value": result.p_value,
    "uplift_mean": result.uplift.mean,
    "uplift_stddev": result.uplift.stddev,
    "error_message": result.error_message,
})
        `);
        const freq = JSON.parse(freqJson);

        assertClose('expected', freq.expected, EXPECTED.frequentist.expected);
        assertCloseArray('ci', freq.ci, EXPECTED.frequentist.ci);
        assertClose('p_value', freq.p_value, EXPECTED.frequentist.p_value);
        assertClose('uplift_mean', freq.uplift_mean, EXPECTED.frequentist.uplift_mean);
        assertClose('uplift_stddev', freq.uplift_stddev, EXPECTED.frequentist.uplift_stddev);

        // ============================================================
        // Test 3: SRM Check
        // ============================================================
        log('\n═══ Test 3: SRM Check ═══', 'info');
        const srmJson = await pyodide.runPythonAsync(`
balanced_p = check_srm([5000, 5100], [0.5, 0.5])
imbalanced_p = check_srm([5000, 3000], [0.5, 0.5])

json.dumps({
    "balanced_p": balanced_p,
    "imbalanced_p": imbalanced_p,
})
        `);
        const srm = JSON.parse(srmJson);

        assertClose('balanced_p', srm.balanced_p, EXPECTED.srm.balanced_p);
        // For the extremely small p-value, check that it's also essentially zero
        assertClose('imbalanced_p', srm.imbalanced_p, EXPECTED.srm.imbalanced_p, 1e-100);

        // ============================================================
        // Memory check
        // ============================================================
        log('\n═══ Memory Usage ═══', 'info');
        if (performance.memory) {
          const mb = (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(1);
          const limit = (performance.memory.jsHeapSizeLimit / 1024 / 1024).toFixed(0);
          log(`  JS heap: ${mb} MB / ${limit} MB limit`, mb > 500 ? 'warn' : 'info');
        } else {
          log('  performance.memory not available (non-Chrome browser)', 'warn');
        }

        // ============================================================
        // Summary
        // ============================================================
        const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
        log(`\n${'═'.repeat(50)}`, 'info');
        log(`Total: ${totalAssertions} assertions, ${passedAssertions} passed, ${failedAssertions} failed (${elapsed}s)`, failedAssertions > 0 ? 'fail' : 'pass');

        const summaryEl = document.getElementById('summary');
        if (failedAssertions === 0) {
          summaryEl.innerHTML = `<div class="summary pass-bg">GO — All ${totalAssertions} assertions passed. gbstats is compatible with Pyodide WASM.</div>`;
        } else {
          summaryEl.innerHTML = `<div class="summary fail-bg">NO-GO — ${failedAssertions} of ${totalAssertions} assertions failed. Review output above.</div>`;
        }

      } catch (err) {
        log(`\nFATAL ERROR: ${err}`, 'fail');
        log(err.stack || '', 'fail');
        console.error(err);
        document.getElementById('summary').innerHTML =
          `<div class="summary fail-bg">NO-GO — Fatal error during test execution. See log above.</div>`;
      } finally {
        document.getElementById('run').disabled = false;
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
</body>
</html>
